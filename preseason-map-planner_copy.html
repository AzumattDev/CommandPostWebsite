<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last War — Pre-Season Map Planner</title>
<link rel="stylesheet" href="style.css">
<script src="nav.js"></script>
<style>
:root{--ps:#a78bfa;--ps-bg:rgba(167,139,250,.08);--ps-bdr:rgba(167,139,250,.25)}

.ps-hero{padding:1.75rem 0 1rem}
.ps-hero h1{font-family:'Chakra Petch',sans-serif;font-size:clamp(1.3rem,3.5vw,1.9rem);font-weight:700;margin-bottom:.3rem}
.ps-hero h1 .acc{color:var(--ps)}
.ps-hero .sub{font-size:.88rem;color:var(--text2)}

.planner-layout{display:grid;grid-template-columns:260px 1fr;gap:1rem;align-items:start}
@media(max-width:860px){.planner-layout{grid-template-columns:1fr}}

.sidebar{display:flex;flex-direction:column;gap:.75rem;position:sticky;top:58px;max-height:calc(100vh - 70px);overflow-y:auto}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1rem;flex-shrink:0}
.panel-title{font-family:'JetBrains Mono',monospace;font-size:.66rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between}
.panel-title .cnt{font-size:.65rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;color:var(--text3)}

.add-row{display:flex;gap:4px;margin-bottom:.5rem}
.add-row input[type=text]{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:5px 7px;color:var(--text);font-family:'Chakra Petch',sans-serif;font-size:.82rem;font-weight:700;text-transform:uppercase;min-width:0}
.add-row input[type=text]:first-child{width:58px;flex-shrink:0}
.add-row input[type=text]:nth-child(2){flex:1}
.add-row input[type=text]:focus{outline:none;border-color:var(--ps)}
.add-row input[type=color]{width:30px;height:30px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);padding:2px;cursor:pointer;flex-shrink:0}
.add-row button{padding:5px 9px;background:var(--ps-bg);border:1px solid var(--ps-bdr);border-radius:7px;color:var(--ps);font-family:'Chakra Petch',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap}
.add-row button:hover{background:rgba(167,139,250,.16)}

.a-list{display:flex;flex-direction:column;gap:3px;max-height:220px;overflow-y:auto}
.a-chip{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:4px 7px;transition:border-color .12s,background .12s}
.a-chip:hover{border-color:rgba(167,139,250,.3)}
.a-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.a-tag{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:.82rem;flex-shrink:0}
.a-name{font-size:.73rem;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.a-cnt{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text3);background:var(--surface3);border-radius:3px;padding:1px 5px;flex-shrink:0}
.a-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.75rem;padding:1px 4px;border-radius:3px}
.a-del:hover{color:var(--red);background:var(--red-bg)}
.a-empty{font-size:.75rem;color:var(--text3);padding:3px 2px}

.type-list{display:flex;flex-direction:column;gap:2px}
.type-row{display:flex;align-items:center;gap:6px;padding:4px 5px;border-radius:6px;cursor:pointer;transition:background .12s;border:1px solid transparent}
.type-row:hover{background:var(--surface2)}
.type-row.flt{background:var(--surface2);border-color:var(--border2)}
.t-sw{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.t-num{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text3);width:10px;flex-shrink:0}
.t-lbl{font-size:.77rem;color:var(--text2);flex:1}
.t-cnt{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text3);background:var(--surface3);border-radius:3px;padding:1px 4px}

.mode-bar{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.35rem .75rem;margin-bottom:.5rem;font-size:.74rem;color:var(--text2)}
.mode-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--green);animation:mpulse 1.6s ease-in-out infinite}
@keyframes mpulse{0%,100%{opacity:1}50%{opacity:.25}}
.mode-hint{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text3);margin-left:auto}

.action-btns{display:flex;gap:5px;flex-wrap:wrap}
.ps-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Chakra Petch',sans-serif;font-size:.74rem;font-weight:600;cursor:pointer;transition:all .13s}
.ps-btn:hover{background:var(--surface2);color:var(--text)}
.ps-btn-primary{background:var(--ps-bg);border-color:var(--ps-bdr);color:var(--ps)}
.ps-btn-primary:hover{background:rgba(167,139,250,.15)}
.ps-btn-danger{color:var(--red);border-color:rgba(248,113,113,.2)}
.ps-btn-danger:hover{background:var(--red-bg)}

.map-outer{position:relative;border:1px solid var(--border);border-radius:12px;line-height:0;overflow:hidden}
.map-outer img{display:block;width:100%;height:auto;pointer-events:none;-webkit-user-drag:none;user-select:none;filter:brightness(.88) sepia(.06)}
.map-svg{position:absolute;inset:0;width:100%;height:100%;mix-blend-mode:multiply}

.t-poly{fill:transparent;stroke:transparent;stroke-width:0;cursor:pointer;transition:fill .12s,stroke .12s,fill-opacity .12s}
.t-poly:hover{fill-opacity:.72!important}
.t-poly.has-data{fill-opacity:.55;stroke-opacity:0}
.t-poly.faded{fill-opacity:.08}
.t-poly.hi{fill-opacity:.72!important}

.t-lbl{font-family:'Chakra Petch',sans-serif;font-size:11px;font-weight:700;text-anchor:middle;dominant-baseline:middle;pointer-events:none;paint-order:stroke;stroke-linejoin:round;stroke-width:4;stroke:#fff;fill:#111}
.t-lbl.faded{opacity:.15}

.zone-popup{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:.8rem;width:215px;z-index:9100;box-shadow:0 10px 40px rgba(0,0,0,.6);display:none}
.zone-popup.show{display:block}
.zp-head{display:flex;align-items:center;gap:6px;margin-bottom:.55rem}
.zp-sw{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:none}
.zp-title{font-family:'Chakra Petch',sans-serif;font-size:.76rem;font-weight:600;color:var(--text)}
.zp-field{display:flex;flex-direction:column;gap:2px;margin-bottom:.4rem}
.zp-lbl{font-size:.6rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
.zp-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.78rem;width:100%}
.zp-sel:focus{outline:none;border-color:var(--ps)}
.zp-btns{display:flex;gap:4px;margin-top:.55rem}
.zp-btn{flex:1;padding:4px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'Chakra Petch',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .12s}
.zp-btn:hover{background:var(--surface2);color:var(--text)}
.zp-save{background:var(--ps-bg);border-color:var(--ps-bdr);color:var(--ps)}
.zp-save:hover{background:rgba(167,139,250,.15)}
.zp-clr{color:var(--red);border-color:rgba(248,113,113,.2)}
.zp-clr:hover{background:var(--red-bg)}
</style>
</head>
<body>
<div class="container" style="max-width:1160px">
  <div class="ps-hero">
    <h1>Pre-Season <span class="acc">Map Planner</span></h1>
    <p class="sub">Click any territory section to assign an alliance and type. Hover to highlight, click to edit.</p>
  </div>

  <div class="planner-layout">
    <div class="sidebar">
      <div class="panel">
        <div class="panel-title">Alliances <span class="cnt" id="aCount">0</span></div>
        <div class="add-row">
          <input type="text" id="inTag" placeholder="TAG" maxlength="5" onkeydown="if(event.key==='Enter')addAlliance()">
          <input type="text" id="inName" placeholder="Name" onkeydown="if(event.key==='Enter')addAlliance()">
          <input type="color" id="inColor" value="#a78bfa" title="Color">
          <button onclick="addAlliance()">+</button>
        </div>
        <div class="a-list" id="aList"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Territory Types <span style="font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text3)">click to filter</span></div>
        <div class="type-list" id="typeList"></div>
      </div>

      <div class="panel">
        <div class="panel-title">Actions</div>
        <div class="action-btns">
          <button class="ps-btn ps-btn-primary" onclick="exportPNG()">Export PNG</button>
          <button class="ps-btn" onclick="saveState()">Save</button>
          <button class="ps-btn ps-btn-danger" onclick="clearAll()">Clear All</button>
        </div>
      </div>
    </div>

    <div>
      <div class="mode-bar">
        <div class="mode-dot"></div>
        <span>Click a territory cell to assign it</span>
        <span class="mode-hint">87 zones &bull; Ctrl+S to save</span>
      </div>
      <div class="map-outer" id="mapOuter">
        <img src="images/preseason_map.png" id="mapImg" alt="Pre-Season Map" draggable="false">
        <svg class="map-svg" id="mapSvg" viewBox="0 0 685 558" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
    </div>
  </div>
</div>

<div class="zone-popup" id="zonePopup">
  <div class="zp-head">
    <div class="zp-sw" id="zpSw"></div>
    <div class="zp-title" id="zpTitle">Zone</div>
  </div>
  <div class="zp-field">
    <div class="zp-lbl">Alliance</div>
    <select class="zp-sel" id="zpAlliance"></select>
  </div>
  <div class="zp-field">
    <div class="zp-lbl">Territory Type</div>
    <select class="zp-sel" id="zpType"></select>
  </div>
  <div class="zp-btns">
    <button class="zp-btn zp-clr" onclick="clearZone()">Clear</button>
    <button class="zp-btn" onclick="closePopup()">Cancel</button>
    <button class="zp-btn zp-save" onclick="saveZone()">Save</button>
  </div>
</div>

const ZONE_TYPES=[
  {id:1,name:'Village',       color:'#4ade80'},
  {id:2,name:'Chemical Plant',color:'#a3e635'},
  {id:3,name:'Power Plant',   color:'#60a5fa'},
  {id:4,name:'Town',          color:'#fbbf24'},
  {id:5,name:'Metropolis',    color:'#fb923c'},
  {id:6,name:'Military Base', color:'#f87171'},
  {id:7,name:'Capitol',       color:'#f0c040'},
];

const SK='psmap_v2';
let state={alliances:[],zones:{}};
let editId=null, filterType=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function saveState(){localStorage.setItem(SK,JSON.stringify(state));renderAll()}
function loadState(){try{const d=localStorage.getItem(SK);if(d)state=JSON.parse(d)}catch(e){}}

function addAlliance(){
  const tag=document.getElementById('inTag').value.trim().toUpperCase();
  if(!tag)return;
  const name=document.getElementById('inName').value.trim()||tag;
  const color=document.getElementById('inColor').value;
  state.alliances.push({id:uid(),tag,name,color});
  document.getElementById('inTag').value='';
  document.getElementById('inName').value='';
  saveState();
}
function deleteAlliance(id){
  state.alliances=state.alliances.filter(a=>a.id!==id);
  Object.keys(state.zones).forEach(k=>{if(state.zones[k].allianceId===id)state.zones[k].allianceId='';});
  saveState();
}

function zoneColor(tid){
  const z=state.zones[tid];
  if(!z)return null;
  const a=state.alliances.find(a=>a.id===z.allianceId);
  if(a)return a.color;
  const t=ZONE_TYPES.find(t=>t.id===z.type);
  return t?t.color:null;
}
function zoneLabel(tid){
  const z=state.zones[tid];
  if(!z)return '';
  const a=state.alliances.find(a=>a.id===z.allianceId);
  if(a)return a.tag;
  const t=ZONE_TYPES.find(t=>t.id===z.type);
  return t?String(t.id):'';
}

function getCounts(){
  const ac={},tc={};
  Object.values(state.zones).forEach(z=>{
    if(z.allianceId)ac[z.allianceId]=(ac[z.allianceId]||0)+1;
    if(z.type)tc[z.type]=(tc[z.type]||0)+1;
  });
  return {ac,tc};
}

function renderSidebar(){
  const {ac,tc}=getCounts();
  document.getElementById('aCount').textContent=state.alliances.length;
  document.getElementById('aList').innerHTML=state.alliances.length
    ?state.alliances.map(a=>`<div class="a-chip">
        <div class="a-dot" style="background:${a.color}"></div>
        <div class="a-tag" style="color:${a.color}">${a.tag}</div>
        <div class="a-name">${a.name}</div>
        <div class="a-cnt">${ac[a.id]||0}</div>
        <button class="a-del" onclick="deleteAlliance('${a.id}')" title="Remove">✕</button>
      </div>`).join('')
    :'<div class="a-empty">No alliances yet</div>';

  document.getElementById('typeList').innerHTML=ZONE_TYPES.map(t=>`
    <div class="type-row${filterType===t.id?' flt':''}" onclick="toggleFilter(${t.id})">
      <div class="t-sw" style="background:${t.color}"></div>
      <div class="t-num">${t.id}</div>
      <div class="t-lbl">${t.name}</div>
      <div class="t-cnt">${tc[t.id]||0}</div>
    </div>`).join('');
}

function toggleFilter(id){filterType=filterType===id?null:id;renderAll()}

function renderMap(){
  const svg=document.getElementById('mapSvg');
  while(svg.lastChild)svg.removeChild(svg.lastChild);
  const pg=document.createElementNS('http://www.w3.org/2000/svg','g');
  const lg=document.createElementNS('http://www.w3.org/2000/svg','g');

  TERR_DATA.forEach(t=>{
    const color=zoneColor(t.id);
    const label=zoneLabel(t.id);
    const hasData=!!color;
    const faded=filterType!==null&&(!state.zones[t.id]||state.zones[t.id].type!==filterType);

    const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points',t.pts);
    poly.setAttribute('data-tid',t.id);
    poly.classList.add('t-poly');
    if(hasData){poly.classList.add('has-data');poly.style.fill=color;poly.style.stroke=color;}
    if(faded)poly.classList.add('faded');
    poly.addEventListener('click',e=>{e.stopPropagation();openPopup(t.id,e.clientX,e.clientY)});
    poly.addEventListener('mouseenter',()=>highlight(t.id,true));
    poly.addEventListener('mouseleave',()=>highlight(t.id,false));
    pg.appendChild(poly);

    if(label){
      const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
      tx.setAttribute('x',t.cx);tx.setAttribute('y',t.cy);
      tx.setAttribute('data-tid',t.id);
      tx.classList.add('t-lbl');
      if(faded)tx.classList.add('faded');
      tx.textContent=label;
      lg.appendChild(tx);
    }
  });
  svg.appendChild(pg);svg.appendChild(lg);
}

function highlight(id,on){
  document.querySelectorAll('[data-tid="'+id+'"]').forEach(el=>{
    on?el.classList.add('hi'):el.classList.remove('hi');
  });
}

function openPopup(tid,mx,my){
  closePopup();editId=tid;
  const z=state.zones[tid]||{};
  const color=zoneColor(tid);
  const sw=document.getElementById('zpSw');
  sw.style.background=color||'';sw.style.display=color?'block':'none';
  document.getElementById('zpTitle').textContent='Zone '+(tid+1)+' of 87';
  document.getElementById('zpAlliance').innerHTML=
    '<option value="">\u2014 Unassigned \u2014</option>'+
    state.alliances.map(a=>`<option value="${a.id}"${a.id===z.allianceId?' selected':''}>${a.tag} \u2013 ${a.name}</option>`).join('');
  document.getElementById('zpType').innerHTML=
    '<option value="">\u2014 Unknown \u2014</option>'+
    ZONE_TYPES.map(tp=>`<option value="${tp.id}"${tp.id===z.type?' selected':''}>${tp.id} \u2013 ${tp.name}</option>`).join('');
  const pop=document.getElementById('zonePopup');
  const pw=223,ph=195;
  let l=mx+12,t=my+12;
  if(l+pw>window.innerWidth-8)l=mx-pw-12;
  if(t+ph>window.innerHeight-8)t=my-ph-12;
  pop.style.left=l+'px';pop.style.top=t+'px';
  pop.classList.add('show');
}
function closePopup(){document.getElementById('zonePopup').classList.remove('show');editId=null}
function saveZone(){
  if(editId===null)return;
  const aid=document.getElementById('zpAlliance').value;
  const tv=document.getElementById('zpType').value;
  const type=tv?parseInt(tv):null;
  if(!aid&&!type)delete state.zones[editId];
  else state.zones[editId]={allianceId:aid,type};
  closePopup();saveState();
}
function clearZone(){if(editId===null)return;delete state.zones[editId];closePopup();saveState()}
function clearAll(){if(!confirm('Clear all zone assignments?'))return;state.zones={};saveState()}

function exportPNG(){
  const img=document.getElementById('mapImg');
  const W=img.naturalWidth,H=img.naturalHeight;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
  TERR_DATA.forEach(t=>{
    const color=zoneColor(t.id);if(!color)return;
    if(filterType!==null&&(!state.zones[t.id]||state.zones[t.id].type!==filterType))return;
    const pts=t.pts.split(' ').map(p=>p.split(',').map(Number));
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    pts.slice(1).forEach(p=>ctx.lineTo(p[0],p[1]));ctx.closePath();
    ctx.globalAlpha=.42;ctx.fillStyle=color;ctx.fill();
    ctx.globalAlpha=.85;ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
    ctx.globalAlpha=1;
    const lbl=zoneLabel(t.id);
    if(lbl){
      ctx.font='bold 11px Chakra Petch,sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.lineJoin='round';
      ctx.strokeText(lbl,t.cx,t.cy);
      ctx.fillStyle='#fff';ctx.fillText(lbl,t.cx,t.cy);
    }
  });
  const a=document.createElement('a');a.download='preseason_map_plan.png';a.href=c.toDataURL();a.click();
}

function renderAll(){renderSidebar();renderMap()}
document.addEventListener('click',e=>{if(!e.target.closest('.zone-popup')&&!e.target.closest('.t-poly'))closePopup()});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closePopup();
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveState();}
});
loadState();renderAll();
</script>
