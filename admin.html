<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — The Command Post</title>
<link rel="stylesheet" href="style.css">
<style>
:root{--bg:#0a0b0e;--surface:#14151b;--surface2:#1a1b23;--border:#262838}
h1{font-family:'Chakra Petch',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:1.5rem;color:var(--amber)}
h2{font-family:'Chakra Petch',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:1rem;color:var(--text)}
.login-wrap{max-width:340px;margin:4rem auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem}
.login-wrap label{display:block;font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.login-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.95rem;box-sizing:border-box}
.login-wrap input:focus{outline:none;border-color:var(--amber)}
.btn{margin-top:12px;width:100%;padding:10px;border-radius:8px;border:1px solid var(--amber-border);background:rgba(251,191,36,.08);color:var(--amber);font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer}
.btn:hover{background:rgba(251,191,36,.15)}

.correction-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:10px}
.cc-meta{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text3);margin-bottom:.4rem}
.cc-event{font-size:.88rem;font-weight:600;margin-bottom:.3rem}
.cc-correction{font-size:.85rem;color:var(--text2);margin-bottom:.75rem;line-height:1.5}
.cc-actions{display:flex;gap:8px}
.btn-approve{padding:6px 16px;border-radius:7px;border:1px solid var(--green-border);background:rgba(52,211,153,.08);color:var(--green);font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:.8rem;cursor:pointer}
.btn-approve:hover{background:rgba(52,211,153,.15)}
.btn-reject{padding:6px 16px;border-radius:7px;border:1px solid rgba(248,113,113,.2);background:rgba(248,113,113,.05);color:var(--red);font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:.8rem;cursor:pointer}
.btn-reject:hover{background:rgba(248,113,113,.1)}
.empty{color:var(--text3);font-size:.88rem;padding:2rem;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
.status-badge{font-size:.65rem;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;background:rgba(52,211,153,.1);color:var(--green);margin-left:6px}

/* ── Train Rotation ─────────────────────────────────────── */
.section-divider{border:none;border-top:1px solid var(--border);margin:2rem 0}

.conductor-card{background:var(--surface);border:1px solid var(--amber-border);border-radius:var(--radius-lg);padding:1.5rem 1.75rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.25rem}
.conductor-icon{font-size:2.4rem;line-height:1;flex-shrink:0}
.conductor-info{}
.conductor-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:3px}
.conductor-name{font-family:'Chakra Petch',sans-serif;font-size:1.6rem;font-weight:700;color:var(--amber);line-height:1.15}
.conductor-date{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text3);margin-top:3px}

.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:1.5rem}
.upcoming-day{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .85rem}
.upcoming-day.today{border-color:var(--amber-border);background:rgba(251,191,36,.05)}
.upcoming-day-label{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--text3);margin-bottom:2px}
.upcoming-day-name{font-size:.88rem;font-weight:600;color:var(--text)}
.upcoming-day.today .upcoming-day-name{color:var(--amber)}

.roster-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.5rem}
.roster-list{list-style:none;margin-bottom:.75rem}
.roster-list li{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.9rem}
.roster-list li:last-child{border-bottom:none}
.roster-name{font-family:'Chakra Petch',sans-serif;font-weight:600;color:var(--text)}
.roster-name.is-self{color:var(--amber)}
.btn-remove{padding:3px 10px;border-radius:5px;border:1px solid rgba(248,113,113,.2);background:rgba(248,113,113,.05);color:var(--red);font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:.72rem;cursor:pointer}
.btn-remove:hover{background:rgba(248,113,113,.12)}
.roster-add{display:flex;gap:8px;margin-top:.25rem}
.roster-add input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-family:'Chakra Petch',sans-serif;font-size:.88rem}
.roster-add input:focus{outline:none;border-color:var(--amber)}
.btn-add{padding:8px 18px;border-radius:8px;border:1px solid var(--amber-border);background:rgba(251,191,36,.08);color:var(--amber);font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:.82rem;cursor:pointer;white-space:nowrap}
.btn-add:hover{background:rgba(251,191,36,.15)}
.roster-self-hint{font-size:.72rem;color:var(--text3);margin-top:.5rem}
</style>
</head>
<body>
<div class="container">

<div id="loginSection">
  <div class="login-wrap">
    <h1>Admin</h1>
    <label>Admin token</label>
    <input type="password" id="tokenInput" placeholder="Enter token" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Sign in</button>
  </div>
</div>

<div id="adminSection" style="display:none">

  <!-- ── Train Rotation ────────────────────────────────── -->
  <h1>Train Rotation</h1>

  <div id="conductorCard" class="conductor-card">
    <div class="conductor-icon">🚂</div>
    <div class="conductor-info">
      <div class="conductor-label">Today's Conductor</div>
      <div class="conductor-name" id="conductorName">—</div>
      <div class="conductor-date" id="conductorDate"></div>
    </div>
  </div>

  <h2>Next 7 Days</h2>
  <div class="upcoming-grid" id="upcomingGrid"></div>

  <h2>R4 Roster</h2>
  <div class="roster-wrap">
    <ul class="roster-list" id="rosterList"></ul>
    <div class="roster-add">
      <input type="text" id="rosterInput" placeholder="Add name…" maxlength="32" onkeydown="if(event.key==='Enter')addRoster()">
      <button class="btn-add" onclick="addRoster()">Add</button>
    </div>
    <div class="roster-self-hint">Names highlighted in <span style="color:var(--amber)">gold</span> are you (Alliance Leader). The first name added holds that spot — remove and re-add to change it.</div>
  </div>

  <hr class="section-divider">

  <!-- ── Corrections ──────────────────────────────────── -->
  <h1>Pending corrections <span id="countBadge"></span></h1>
  <div id="correctionList"></div>

</div>

</div>
<script>
let adminToken = '';
let rosterCache = [];   // in-memory copy, sourced from D1

/* ── Auth ─────────────────────────────────────────────── */
function login() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  adminToken = t;
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('adminSection').style.display = 'block';
  loadCorrections();
  loadRotation();
}

/* ── Corrections ──────────────────────────────────────── */
async function loadCorrections() {
  const res = await fetch(`/api/corrections?token=${encodeURIComponent(adminToken)}`);
  if (res.status === 401) {
    alert('Invalid token');
    document.getElementById('adminSection').style.display = 'none';
    document.getElementById('loginSection').style.display = 'block';
    return;
  }
  const data = await res.json();
  document.getElementById('countBadge').textContent = data.length ? `(${data.length})` : '';
  const el = document.getElementById('correctionList');
  if (!data.length) { el.innerHTML = '<div class="empty">No pending corrections.</div>'; return; }
  el.innerHTML = data.map(c => `
    <div class="correction-card" id="cc${c.id}">
      <div class="cc-meta">Day ${c.event_day} &nbsp;·&nbsp; ${c.submitted_at}</div>
      <div class="cc-event">${c.event_title}</div>
      <div class="cc-correction">${c.correction}</div>
      <div class="cc-actions">
        <button class="btn-approve" onclick="act(${c.id},'approve')">Approve</button>
        <button class="btn-reject" onclick="act(${c.id},'reject')">Reject</button>
      </div>
    </div>
  `).join('');
}

async function act(id, action) {
  await fetch(`/api/corrections?action=${action}&id=${id}&token=${encodeURIComponent(adminToken)}`, { method: 'POST' });
  const el = document.getElementById('cc' + id);
  if (el) {
    el.style.opacity = '.4';
    el.querySelector('.cc-actions').innerHTML = `<span class="status-badge">${action === 'approve' ? 'Approved' : 'Rejected'}</span>`;
  }
}

/* ── Train Rotation ───────────────────────────────────── */

/* Round-robin by game day — each person gets exactly one turn before anyone repeats */
function conductorForDate(dateStr, roster) {
  if (!roster.length) return null;
  const [y, m, d] = dateStr.split('-').map(Number);
  const dayNum = Math.round((Date.UTC(y, m - 1, d) - Date.UTC(2020, 0, 1)) / 86400000);
  return roster[dayNum % roster.length].name;
}

function localDateStr(offsetDays = 0) {
  // Game reset is 02:00 UTC. Subtract 2 h so the date rolls at reset, not local midnight.
  const d = new Date(Date.now() - 2 * 60 * 60 * 1000);
  d.setUTCDate(d.getUTCDate() + offsetDays);
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, '0');
  const day = String(d.getUTCDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDisplayDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
}

async function loadRotation() {
  const res = await fetch(`/api/train?token=${encodeURIComponent(adminToken)}`);
  if (!res.ok) return;
  rosterCache = await res.json();
  renderRotation();
}

function renderRotation() {
  const roster = rosterCache;
  const today = localDateStr();

  /* Today's conductor */
  const name = conductorForDate(today, roster);
  document.getElementById('conductorName').textContent = name || 'No roster yet';
  document.getElementById('conductorDate').textContent = formatDisplayDate(today);
  document.getElementById('conductorCard').style.borderColor =
    roster.length ? 'var(--amber-border)' : 'var(--border)';

  /* Upcoming 7 days */
  const grid = document.getElementById('upcomingGrid');
  grid.innerHTML = Array.from({ length: 7 }, (_, i) => {
    const ds = localDateStr(i);
    const c = conductorForDate(ds, roster) || '—';
    const isToday = i === 0;
    return `<div class="upcoming-day${isToday ? ' today' : ''}">
      <div class="upcoming-day-label">${isToday ? 'Today · ' : ''}${ds}</div>
      <div class="upcoming-day-name">${escHtml(c)}</div>
    </div>`;
  }).join('');

  /* Roster list */
  const ul = document.getElementById('rosterList');
  if (!roster.length) {
    ul.innerHTML = '<li style="color:var(--text3);font-size:.85rem;padding:8px 0">No members yet — add names below.</li>';
    return;
  }
  ul.innerHTML = roster.map((member, i) => `
    <li>
      <span class="roster-name${i === 0 ? ' is-self' : ''}">${escHtml(member.name)}${i === 0 ? ' (you)' : ''}</span>
      <button class="btn-remove" onclick="removeRoster(${member.id})">Remove</button>
    </li>
  `).join('');
}

async function addRoster() {
  const input = document.getElementById('rosterInput');
  const name = input.value.trim();
  if (!name) return;
  input.disabled = true;
  const res = await fetch(`/api/train?action=add&token=${encodeURIComponent(adminToken)}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name })
  });
  input.disabled = false;
  if (res.status === 409) { alert('That name is already in the roster.'); return; }
  if (!res.ok) { alert('Failed to add member.'); return; }
  input.value = '';
  await loadRotation();
}

async function removeRoster(id) {
  await fetch(`/api/train?action=remove&id=${id}&token=${encodeURIComponent(adminToken)}`, { method: 'POST' });
  await loadRotation();
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
